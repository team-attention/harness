<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F0;
    color: #1A1A1A;
    display: flex;
    flex-direction: column;
    padding: 44pt 56pt 36pt;
    overflow: hidden;
  }
  .section-label { font-size: 10pt; font-weight: 300; color: #999999; text-transform: uppercase; letter-spacing: 1.5pt; margin-bottom: 6pt; }
  h1 { font-size: 24pt; font-weight: 700; line-height: 1.2; margin-bottom: 20pt; }
  .safeguards { display: flex; gap: 16pt; flex: 1; }
  .sg { flex: 1; border-radius: 8pt; padding: 16pt; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .sg-1 { background: #1A1A1A; color: #F5F5F0; }
  .sg-2 { background: #E8E8E3; }
  .sg-icon { font-size: 28pt; font-weight: 700; margin-bottom: 8pt; opacity: 0.4; }
  .sg-title { font-size: 14pt; font-weight: 700; margin-bottom: 8pt; }
  .sg-desc { font-size: 11pt; line-height: 1.5; }
  .sg-1 .sg-desc { color: #999999; }
  .sg-2 .sg-desc { color: #666666; }
  .sg-example { margin-top: auto; padding-top: 8pt; font-size: 10pt; font-family: monospace; opacity: 0.5; }
  .core { margin-top: 12pt; padding: 12pt 16pt; background: #E8E8E3; border-radius: 6pt; font-size: 13pt; color: #666666; text-align: center; }
  .core strong { color: #1A1A1A; font-weight: 700; }
</style>
</head>
<body>
  <p class="section-label">검증</p>
  <h1>안전장치</h1>
  <div class="safeguards">
    <div class="sg sg-1">
      <p class="sg-icon">&#x1f6e1;</p>
      <p class="sg-title">되돌릴 수 있는 환경</p>
      <p class="sg-desc">브랜치/Worktree 격리에서 작업. 실수해도 메인은 안전.</p>
      <p class="sg-example">git worktree add</p>
    </div>
    <div class="sg sg-2">
      <p class="sg-icon">&#x1f6a7;</p>
      <p class="sg-title">위험한 건 사람이 확인</p>
      <p class="sg-desc">삭제, 배포, 외부 발송 같은 작업은 승인 후 실행.</p>
      <p class="sg-example">Runtime Gate</p>
    </div>
    <div class="sg sg-2">
      <p class="sg-icon">&#x1f4cb;</p>
      <p class="sg-title">Dry-run 먼저</p>
      <p class="sg-desc">"이렇게 할 건데 맞나?" 미리보기 후 실행.</p>
      <p class="sg-example">--dry-run</p>
    </div>
  </div>
  <p class="core"><strong>"실수해도 괜찮은 구조"</strong>를 만드는 것이 핵심</p>
</body>
</html>
