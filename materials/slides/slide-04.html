<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F0;
    color: #1A1A1A;
    display: flex;
    flex-direction: column;
    padding: 36pt 72pt 28pt;
    overflow: hidden;
  }
  .section-label { font-size: 10pt; font-weight: 300; color: #999999; text-transform: uppercase; letter-spacing: 1.5pt; margin-bottom: 4pt; }
  h1 { font-size: 20pt; font-weight: 700; line-height: 1.3; margin-bottom: 4pt; }
  .subtitle { font-size: 12pt; font-weight: 400; color: #666666; margin-bottom: 14pt; }
  .content { display: flex; gap: 20pt; flex: 1; align-items: stretch; min-height: 0; }
  .left { flex: 1.2; display: flex; align-items: center; }
  .left img { width: 100%; max-height: 280pt; border-radius: 6pt; object-fit: contain; }
  .right { flex: 1; display: flex; flex-direction: column; gap: 12pt; }
  .right video { width: 100%; max-height: 160pt; border-radius: 6pt; background: #1A1A1A; object-fit: contain; }
  .info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 10pt; }
  .story-line { font-size: 13pt; font-weight: 400; color: #444444; line-height: 1.5; }
  .story-line strong { font-weight: 700; color: #1A1A1A; }
  .highlight-box { padding: 12pt 14pt; background: #1A1A1A; color: #F5F5F0; border-radius: 6pt; font-size: 12pt; font-weight: 400; line-height: 1.5; }
  .highlight-box strong { font-weight: 700; }
  .rank { font-size: 32pt; font-weight: 700; color: #1A1A1A; line-height: 1; }
  .rank-label { font-size: 11pt; font-weight: 400; color: #666666; }
</style>
</head>
<body>
  <p class="section-label">Case Study</p>
  <h1>Harness 셋업을 해드렸더니, 날아다녔다</h1>
  <p class="subtitle">비개발자 디자이너의 AI Native Dashboard 도전기</p>
  <div class="content">
    <div class="left">
      <img src="./assets/ai-native-dashboard.png" alt="AI Native Dashboard 랭킹">
    </div>
    <div class="right">
      <video src="./assets/lyricclip-demo.mov" controls muted playsinline preload="metadata"></video>
      <div class="info">
        <div style="display: flex; align-items: baseline; gap: 8pt;">
          <span class="rank">2위</span>
          <span class="rank-label">대시보드 토큰 사용량</span>
        </div>
        <div class="highlight-box">
          도구가 아니라 <strong>환경</strong>이 바뀌면,<br>비개발자도 이만큼 할 수 있다
        </div>
      </div>
    </div>
  </div>
</body>
</html>
