<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F0;
    color: #1A1A1A;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 60pt 72pt;
    overflow: hidden;
  }
  .accent-bar {
    width: 48pt;
    height: 4pt;
    background: #1A1A1A;
    margin-bottom: 24pt;
  }
  h1 {
    font-size: 44pt;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5pt;
    margin-bottom: 16pt;
  }
  .subtitle {
    font-size: 18pt;
    font-weight: 400;
    color: #666666;
    line-height: 1.5;
    margin-bottom: 40pt;
  }
  .meta {
    font-size: 12pt;
    font-weight: 300;
    color: #999999;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <h1>Harness Engineering</h1>
  <p class="subtitle">AI가 잘 일하는 환경을 설계하는 기술</p>
  <p class="meta">Team Attention 이호연 · 2026.04.07</p>
</body>
</html>
