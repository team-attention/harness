<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F0;
    color: #1A1A1A;
    display: flex;
    flex-direction: column;
    padding: 48pt 72pt 40pt;
    overflow: hidden;
  }
  .section-label { font-size: 10pt; font-weight: 300; color: #999999; text-transform: uppercase; letter-spacing: 1.5pt; margin-bottom: 8pt; }
  h1 { font-size: 26pt; font-weight: 700; line-height: 1.2; margin-bottom: 32pt; }
  .steps { display: flex; align-items: stretch; gap: 0; flex: 1; }
  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20pt 18pt;
    border-radius: 6pt;
  }
  .step-1 { background: #E8E8E3; }
  .step-2 { background: #D4D4D0; }
  .step-3 { background: #1A1A1A; color: #F5F5F0; }
  .step-label { font-size: 9pt; font-weight: 300; color: #999999; text-transform: uppercase; letter-spacing: 1pt; margin-bottom: 8pt; }
  .step-3 .step-label { color: #666666; }
  .step-title { font-size: 16pt; font-weight: 700; margin-bottom: 8pt; line-height: 1.3; }
  .step-desc { font-size: 12pt; font-weight: 400; color: #666666; line-height: 1.5; }
  .step-3 .step-desc { color: #999999; }
  .step-quote { font-size: 11pt; font-weight: 400; color: #999999; font-style: italic; margin-top: 8pt; }
  .step-3 .step-quote { color: #666666; }
  .arrow-col {
    display: flex; align-items: center; justify-content: center;
    width: 28pt; flex-shrink: 0;
  }
  .arrow-col span { font-size: 16pt; color: #999999; }
</style>
</head>
<body>
  <p class="section-label">Harness Engineering이란</p>
  <h1>진화 흐름</h1>
  <div class="steps">
    <div class="step step-1">
      <p class="step-label">Level 1</p>
      <p class="step-title">Prompt Engineering</p>
      <p class="step-quote">"이렇게 말해봐"</p>
      <p class="step-desc">질문을 잘 하면 답이 좋아진다</p>
    </div>
    <div class="arrow-col"><span>→</span></div>
    <div class="step step-2">
      <p class="step-label">Level 2</p>
      <p class="step-title">Context Engineering</p>
      <p class="step-quote">"이런 배경지식을 줘봐"</p>
      <p class="step-desc">배경을 알려주면 맥락을 이해한다</p>
    </div>
    <div class="arrow-col"><span>→</span></div>
    <div class="step step-3">
      <p class="step-label">Level 3</p>
      <p class="step-title">Harness Engineering</p>
      <p class="step-quote">"환경 자체를 설계하자"</p>
      <p class="step-desc">작업 환경을 만들어주면 혼자서도 잘한다</p>
    </div>
  </div>
</body>
</html>
