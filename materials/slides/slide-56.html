<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #1A1A1A;
    color: #F5F5F0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60pt 72pt;
    overflow: hidden;
    text-align: center;
  }
  .accent-bar { width: 48pt; height: 4pt; background: #F5F5F0; margin-bottom: 24pt; }
  h1 { font-size: 36pt; font-weight: 700; line-height: 1.3; margin-bottom: 16pt; }
  .sub { font-size: 16pt; font-weight: 400; color: #999999; line-height: 1.6; margin-bottom: 32pt; }
  .qa { font-size: 14pt; font-weight: 300; color: #666666; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <h1>감사합니다</h1>
  <p class="sub">Q&A</p>
</body>
</html>
