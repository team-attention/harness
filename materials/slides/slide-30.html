<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F0;
    color: #1A1A1A;
    display: flex;
    flex-direction: column;
    padding: 40pt 56pt 32pt;
    overflow: hidden;
  }
  .section-label { font-size: 10pt; font-weight: 300; color: #999999; text-transform: uppercase; letter-spacing: 1.5pt; margin-bottom: 4pt; }
  h1 { font-size: 22pt; font-weight: 700; line-height: 1.2; margin-bottom: 16pt; }
  .content { flex: 1; display: flex; gap: 16pt; }
  .col { flex: 1; border-radius: 8pt; padding: 16pt; display: flex; flex-direction: column; }
  .col-bad { background: #E8E8E3; }
  .col-good { background: #1A1A1A; color: #F5F5F0; }
  .col-label { font-size: 10pt; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5pt; margin-bottom: 12pt; }
  .col-bad .col-label { color: #999999; }
  .col-good .col-label { color: #666666; }
  .flow-step { font-size: 11pt; line-height: 1.5; margin-bottom: 6pt; }
  .col-bad .flow-step { color: #666666; }
  .col-good .flow-step { color: #CCCCCC; }
  .flow-arrow { font-size: 10pt; color: #D4D4D0; margin-bottom: 6pt; }
  .col-good .flow-arrow { color: #555555; }
  .result { margin-top: auto; padding-top: 10pt; border-top: 1pt solid; font-size: 12pt; font-weight: 700; }
  .col-bad .result { border-color: #D4D4D0; color: #999999; }
  .col-good .result { border-color: #444444; color: #F5F5F0; }
  .note { margin-top: 10pt; font-size: 11pt; color: #999999; text-align: center; }
  .note strong { color: #1A1A1A; }
</style>
</head>
<body>
  <p class="section-label">계획</p>
  <h1>계획 세우게 하기 — "해줘"의 함정</h1>
  <div class="content">
    <div class="col col-bad">
      <p class="col-label">안티패턴: "해줘"</p>
      <p class="flow-step">"이거 만들어줘"</p>
      <p class="flow-arrow">↓</p>
      <p class="flow-step">AI가 알아서 만듦</p>
      <p class="flow-arrow">↓</p>
      <p class="flow-step">검수 → "아닌데..."</p>
      <p class="flow-arrow">↓</p>
      <p class="flow-step">다시 시킴 → 검수 → 다시...</p>
      <p class="flow-arrow">↓</p>
      <p class="result">시간만 날림</p>
    </div>
    <div class="col col-good">
      <p class="col-label">같이 계획부터</p>
      <p class="flow-step">"~~할 건데 같이 계획 세워보자"</p>
      <p class="flow-arrow">↓</p>
      <p class="flow-step">AI가 계획 작성</p>
      <p class="flow-arrow">↓</p>
      <p class="flow-step">사람이 검토 → 수정 → 승인</p>
      <p class="flow-arrow">↓</p>
      <p class="flow-step">승인된 계획대로 실행</p>
      <p class="flow-arrow">↓</p>
      <p class="result">높은 성공률</p>
    </div>
  </div>
  <p class="note"><strong>계획과 실행을 분리</strong>하면 검수 횟수가 줄고, 결과의 예측 가능성이 올라간다</p>
</body>
</html>
