<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F0;
    color: #1A1A1A;
    display: flex;
    flex-direction: column;
    padding: 48pt 72pt 40pt;
    overflow: hidden;
  }
  .section-label { font-size: 10pt; font-weight: 300; color: #999999; text-transform: uppercase; letter-spacing: 1.5pt; margin-bottom: 8pt; }
  h1 { font-size: 26pt; font-weight: 700; line-height: 1.2; margin-bottom: 28pt; }
  .guides { display: flex; flex-direction: column; gap: 12pt; flex: 1; }
  .guide { display: flex; gap: 16pt; align-items: baseline; padding-bottom: 12pt; border-bottom: 1pt solid #E8E8E3; }
  .guide:last-child { border-bottom: none; }
  .guide-level { font-size: 11pt; font-weight: 700; color: #999999; min-width: 60pt; }
  .guide-content { font-size: 14pt; font-weight: 400; color: #666666; line-height: 1.6; }
  .guide-content strong { color: #1A1A1A; font-weight: 700; }
  .tip { margin-top: auto; padding: 14pt 18pt; background: #E8E8E3; border-radius: 6pt; font-size: 13pt; font-weight: 400; color: #666666; }
  .tip strong { color: #1A1A1A; }
</style>
</head>
<body>
  <p class="section-label">맥락</p>
  <h1>CLAUDE.md 실전 가이드</h1>
  <div class="guides">
    <div class="guide">
      <span class="guide-level">User</span>
      <p class="guide-content"><strong>내 작업 습관</strong>, 선호하는 코딩 스타일, 공통 규칙</p>
    </div>
    <div class="guide">
      <span class="guide-level">Project</span>
      <p class="guide-content"><strong>이 프로젝트의 기술 스택</strong>, 컨벤션, 중요한 제약</p>
    </div>
    <div class="guide">
      <span class="guide-level">Folder</span>
      <p class="guide-content"><strong>특정 모듈의 특수한 규칙</strong></p>
    </div>
  </div>
  <div class="tip"><strong>팁:</strong> "최대 200줄 정도를 유지하며 계속 업데이트하라. 너무 길어지면 AI 성능이 급격히 저하된다."</div>
</body>
</html>
