<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #1A1A1A;
    color: #F5F5F0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60pt 72pt;
    overflow: hidden;
  }
  h1 { font-size: 36pt; font-weight: 700; line-height: 1.2; margin-bottom: 12pt; text-align: center; }
  .sub { font-size: 15pt; font-weight: 400; color: #999999; text-align: center; margin-bottom: 28pt; }
  .demo-tag { display: inline-block; padding: 6pt 16pt; border: 1pt solid #555555; border-radius: 20pt; font-size: 12pt; font-weight: 400; color: #666666; }
</style>
</head>
<body>
  <h1>내 Harness 라이브 데모</h1>
  <p class="sub">프로젝트 구조 → 설정 파일 → 실제 작업 흐름</p>
  <span class="demo-tag">LIVE DEMO</span>
</body>
</html>
