<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #F5F5F0;
    color: #1A1A1A;
    display: flex;
    flex-direction: column;
    padding: 36pt 56pt 28pt;
    overflow: hidden;
  }
  .header { margin-bottom: 14pt; }
  .section-label { font-size: 10pt; font-weight: 300; color: #999999; text-transform: uppercase; letter-spacing: 1.5pt; margin-bottom: 4pt; }
  h1 { font-size: 24pt; font-weight: 700; line-height: 1.2; }
  .cycle-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
  .cycle { display: flex; flex-direction: column; align-items: center; gap: 8pt; }
  .row { display: flex; align-items: center; gap: 8pt; }
  .node {
    width: 104pt; padding: 10pt 8pt;
    border-radius: 6pt;
    text-align: center;
    color: #F5F5F0;
  }
  .n1 { background: #1A1A1A; }
  .n2 { background: #2E2E2E; }
  .n3 { background: #444444; }
  .n4 { background: #5E5E5E; }
  .n5 { background: #787878; }
  .n6 { background: #929292; }
  .node-title { font-size: 13pt; font-weight: 700; margin-bottom: 2pt; }
  .node-en { font-size: 8pt; font-weight: 400; opacity: 0.6; margin-bottom: 2pt; }
  .node-desc { font-size: 8pt; opacity: 0.5; }
  .arrow-h { font-size: 14pt; color: #D4D4D0; width: 16pt; text-align: center; }
  .arrow-row { display: flex; width: 100%; justify-content: space-between; padding: 0 44pt; }
  .arrow-up { font-size: 14pt; color: #D4D4D0; }
  .arrow-down { font-size: 14pt; color: #D4D4D0; }
</style>
</head>
<body>
  <div class="header">
    <p class="section-label">큰 그림</p>
    <h1>Harness의 6개 축 — 순환 구조</h1>
  </div>
  <div class="cycle-wrap">
    <div class="cycle">
      <div class="row">
        <div class="node n1">
          <p class="node-title">구조</p>
          <p class="node-en">Scaffolding</p>
          <p class="node-desc">뭘 깔아두는가</p>
        </div>
        <p class="arrow-h">→</p>
        <div class="node n2">
          <p class="node-title">맥락</p>
          <p class="node-en">Context</p>
          <p class="node-desc">AI가 뭘 아는가</p>
        </div>
        <p class="arrow-h">→</p>
        <div class="node n3">
          <p class="node-title">계획</p>
          <p class="node-en">Planning</p>
          <p class="node-desc">뭘 할지 정하는가</p>
        </div>
      </div>
      <div class="arrow-row">
        <p class="arrow-up">↑</p>
        <p class="arrow-down">↓</p>
      </div>
      <div class="row">
        <div class="node n6">
          <p class="node-title">개선</p>
          <p class="node-en">Compounding</p>
          <p class="node-desc">어떻게 나아지는가</p>
        </div>
        <p class="arrow-h">←</p>
        <div class="node n5">
          <p class="node-title">검증</p>
          <p class="node-en">Verification</p>
          <p class="node-desc">어떻게 믿는가</p>
        </div>
        <p class="arrow-h">←</p>
        <div class="node n4">
          <p class="node-title">실행</p>
          <p class="node-en">Execution</p>
          <p class="node-desc">어떻게 시키는가</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
