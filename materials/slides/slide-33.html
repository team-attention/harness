<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #1A1A1A;
    color: #F5F5F0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60pt 72pt;
    overflow: hidden;
  }
  .num { font-size: 44pt; font-weight: 700; color: #333333; margin-bottom: 8pt; line-height: 1.2; }
  h1 { font-size: 36pt; font-weight: 700; line-height: 1.2; margin-bottom: 12pt; }
  .sub { font-size: 15pt; font-weight: 400; color: #666666; }
</style>
</head>
<body>
  <p class="num">04</p>
  <h1>실행</h1>
  <p class="sub">혼자, 부하 파견, 팀 — 상황에 맞는 실행 패턴</p>
</body>
</html>
