<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #1A1A1A;
    color: #F5F5F0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60pt 72pt;
    overflow: hidden;
    text-align: center;
  }
  .section-label { font-size: 10pt; font-weight: 300; color: #666666; text-transform: uppercase; letter-spacing: 1.5pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; font-weight: 700; line-height: 1.3; margin-bottom: 24pt; max-width: 540pt; }
  .shift { display: flex; align-items: center; gap: 20pt; }
  .shift-from { font-size: 18pt; font-weight: 400; color: #666666; }
  .shift-arrow { font-size: 18pt; color: #666666; }
  .shift-to { font-size: 18pt; font-weight: 700; color: #F5F5F0; }
</style>
</head>
<body>
  <p class="section-label">Harness Engineering이란</p>
  <h1>프롬프트만으로는 부족하다</h1>
  <div class="shift">
    <span class="shift-from">"말을 잘 하는 것"</span>
    <span class="shift-arrow">→</span>
    <span class="shift-to">"일하는 방법을 설계해주는 것"</span>
  </div>
</body>
</html>
